<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Dinesh Muthukrishnan</title>

<script src="https://cdn.tailwindcss.com"></script>

<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

<style>

body{
background:#f6f6f6;
font-family:Arial, sans-serif;
color:#1c1c1c;
}

</style>

</head>

<body>

<div id="root"></div>

<script>

const e = React.createElement;

function Navbar(){

return e("div",
{className:"bg-white shadow p-5 flex justify-between"},

e("h1",{className:"text-xl font-semibold"},"Dinesh Muthukrishnan"),

e("div",{className:"space-x-6 text-gray-600"},

e("a",{href:"#about"},"About"),
e("a",{href:"#skills"},"Skills"),
e("a",{href:"#projects"},"Projects")

)

)

}

function Hero(){

return e("section",
{className:"max-w-6xl mx-auto grid md:grid-cols-2 gap-10 pt-20 pb-20"},

e("div",null,

e("h2",{className:"text-gray-500"},"Software Developer"),

e("h1",{className:"text-4xl font-bold mt-2"},"Dinesh Muthukrishnan"),

e("p",{className:"mt-4 text-gray-600"},
"Building scalable MERN and cloud applications."),

e("button",
{className:"mt-6 bg-yellow-600 text-white px-6 py-3 rounded"},
"View Projects")

),

e("img",
{
src:"profile.jpg",
className:"rounded-xl shadow"
})

)

}

function About(){

return e("section",
{id:"about",className:"max-w-6xl mx-auto py-20 grid md:grid-cols-2 gap-10"},

e("div",null,

e("h2",{className:"text-3xl font-semibold"},"About Me"),

e("p",{className:"mt-4 text-gray-600"},
"Software Developer with 2+ years MERN experience."),

e("ul",{className:"mt-4 space-y-2"},

e("li",null,"✔ REST APIs"),
e("li",null,"✔ Cloud Deployment"),
e("li",null,"✔ Performance Optimization")

)

),

e("img",{src:"about.jpg",className:"rounded-xl shadow"})

)

}

function Skills(){

return e("section",
{id:"skills",className:"max-w-6xl mx-auto py-20"},

e("h2",{className:"text-3xl font-semibold mb-10"},"Skills"),

e("div",{className:"grid md:grid-cols-3 gap-6"},

skillCard("Frontend","React, Redux, Tailwind"),
skillCard("Backend","Node, Express"),
skillCard("Database","MongoDB, MySQL")

)

)

}

function skillCard(title,desc){

return e("div",
{className:"bg-white p-6 rounded shadow hover:scale-105 transition"},

e("h3",{className:"font-semibold text-lg"},title),
e("p",{className:"text-gray-600 mt-2"},desc)

)

}

function Projects(){

return e("section",
{id:"projects",className:"max-w-6xl mx-auto py-20"},

e("h2",{className:"text-3xl font-semibold mb-10"},"Projects"),

e("div",{className:"grid md:grid-cols-3 gap-6"},

projectCard("EROCRM","CRM Dashboard"),
projectCard("DOXOR","Healthcare System"),
projectCard("GN1918","Order Management")

)

)

}

function projectCard(title,desc){

return e("div",
{className:"bg-white rounded shadow hover:scale-105 transition overflow-hidden"},

e("img",{src:"about.jpg"}),

e("div",{className:"p-4"},

e("h3",{className:"font-semibold"},title),
e("p",{className:"text-gray-600"},desc)

)

)

}

function Contact(){

return e("section",
{className:"py-20 bg-white text-center"},

e("h2",{className:"text-3xl font-semibold"},"Have a Project in Mind?"),

e("button",
{className:"mt-6 bg-yellow-600 text-white px-8 py-3 rounded"},
"Contact Me")

)

}

function App(){

return e("div",null,

e(Navbar),
e(Hero),
e(About),
e(Skills),
e(Projects),
e(Contact)

)

}

ReactDOM.createRoot(document.getElementById("root")).render(e(App));

</script>

</body>
</html>
